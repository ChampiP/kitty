font_family JetBrainsMono Nerd Font
font_size 11.0

confirm_os_window_close 0
enable_audio_bell no

background_opacity 0.85
background_blur 64

shell fish

linux_display_server wayland

# macOS WhiteSur Dark
foreground #e0e0e0
background #1e1e2e
selection_foreground #ffffff
selection_background #3a3a5c
cursor #ffffff
cursor_text_color #1e1e2e

color0  #2a2a3d
color1  #ff5f57
color2  #2acf2a
color3  #febc2e
color4  #2e8ccf
color5  #a550a7
color6  #58d1eb
color7  #d4d4dc
color8  #545469
color9  #ff6e6a
color10 #43d645
color11 #ffc942
color12 #4da3e0
color13 #c165c3
color14 #6ee0f5
color15 #ececf0

# --- animación de cursor ---
# start_threshold en 1 para que la estela se vea hasta escribiendo normal
# (con el valor por defecto de 2 solo se activa en saltos grandes del cursor,
# no letra por letra, por eso no se notaba)
cursor_trail 3
cursor_trail_decay 0.2 0.8
cursor_trail_start_threshold 1
cursor_trail_color #58d1eb

# --- flash de pantalla cuando algo hace "bell" (ej. al terminar un proceso) ---
visual_bell_duration 0.3
visual_bell_color #58d1eb

# --- bordes, tabs, scrollbar, marcas (acentos con la misma paleta vivida de arriba) ---
active_border_color     #2e8ccf
inactive_border_color   #545469
bell_border_color       #febc2e

active_tab_foreground   #1e1e2e
active_tab_background   #2e8ccf
inactive_tab_foreground #d4d4dc
inactive_tab_background #2a2a3d
tab_bar_background      #17171f
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      " {title} "

scrollbar_handle_color  #6a6a8a
scrollbar_track_color   #2a2a3d

url_color #58d1eb
url_style curly

mark1_foreground #1e1e2e
mark1_background #58d1eb
mark2_foreground #1e1e2e
mark2_background #a550a7
mark3_foreground #1e1e2e
mark3_background #2e8ccf

# --- avisos cuando termina un comando largo (ej. un agente de Claude Code) mientras no tienes la pestaña enfocada ---
shell_integration enabled
notify_on_cmd_finish unfocused 20 notify

# --- Windows+S: divide la ventana en 2 y abre otra terminal (mismo directorio) ---
map super+s launch --type=window --cwd=current

window_padding_width 8
window_margin_width 2
single_window_margin_width 0
